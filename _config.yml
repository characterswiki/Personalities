# --- Site Settings ---
title: "Personalities Database"
description: "Detailed personality profiles of characters from Japanese media, including anime, manga, and light novels."
author: "Characters Wiki"
url: "https://personalitytraits.vercel.app"   # Updated to your Vercel domain
baseurl: ""                                    # Must be empty for Vercel root

# --- Collections ---
collections:
  personalities:
    output: true
    permalink: /:name/          # Clean URLs: /character-name

# --- Layout Defaults ---
defaults:
  - scope:
      path: ""
      type: "personalities"
    values:
      layout: "personality"

# --- SEO & Social Metadata ---
social:
  name: "Characters Wiki"
  links:
    - https://github.com/characterswiki/Personalities
twitter:
  username: "characterswiki"
  card: "summary_large_image"
facebook:
  app_id: ""                     # Optional

# --- Build Settings ---
markdown: kramdown
highlighter: rouge
excerpt_separator: ""

# --- Files to Exclude from Build ---
exclude:
  - generate_pages.py
  - .github/
  - _data/
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .gitignore
  - vercel.json

# --- Plugins ---
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
