---
layout: default
---

<article class="personality">
  <!-- JSON‑LD structured data for SEO -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "{{ page.title | escape }}",
    "description": {{ page.description | strip_html | jsonify }},
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
  }
  </script>

  <h1>{{ page.title }}</h1>

  <!-- Personality content – this comes from the body of the markdown file -->
  <div class="personality-content">
    {{ content }}
  </div>

  <p class="back-link">
    <a href="{{ '/' | relative_url }}">← Back to all personalities</a>
  </p>
</article>
