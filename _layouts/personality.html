---
layout: default
---

<article class="post-content">
  <header style="margin-bottom: 3rem; text-align: center;">
    <p style="text-transform: uppercase; color: var(--primary-color); font-weight: 700; font-size: 0.85rem; letter-spacing: 0.1em; margin-bottom: 0.5rem;">Personality Analysis</p>
    <h1 style="font-size: 2.8rem; letter-spacing: -0.03em;">{{ page.title }}</h1>
    <div style="height: 4px; width: 60px; background: var(--primary-color); margin: 1.5rem auto;"></div>
  </header>

  <div class="entry-content">
    {{ content }}
  </div>
  
  <footer style="text-align: left; padding: 2rem; background: #fff; border: 1px solid var(--border-color); border-radius: 8px;">
    <h4 style="margin-bottom: 0.5rem;">Explore More</h4>
    <p>Discover other character traits in our full <a href="/">Personality Database</a>.</p>
  </footer>
</article>
