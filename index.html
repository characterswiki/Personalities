---
layout: default
title: Character Personality Database
---

<input id="search" type="text" placeholder="Search personalities...">

<section class="cards">

{% for item in site.personalities %}

<article class="card">

<h2>
<a href="{{ item.url | relative_url }}">
{{ item.name }}
</a>
</h2>

<p>
{{ item.personality | strip_html | truncatewords: 25 }}
</p>

</article>

{% endfor %}

</section>
