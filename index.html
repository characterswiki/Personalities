---
layout: default
title: Character Personality Database
---

<main>
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>

  <section class="cards">
    {% for item in site.personalities %}
      <div class="card">
        <h2><a href="{{ item.url | relative_url }}">{{ item.name }}</a></h2>
        <p>{{ item.personality | strip_html | truncatewords: 25 }}</p>
      </div>
    {% endfor %}
  </section>
</main>
