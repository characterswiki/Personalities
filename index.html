---
layout: default
title: Character Personality Database
---

<main>
  <section class="hero">
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
  </section>

  <div class="search-container">
    <input type="text" id="search" placeholder="Search personalities..." aria-label="Search characters">
  </div>

  <!-- SINGLE LOOP using the collection -->
  <section class="cards">
    {% for item in site.personalities %}
      <a class="card" href="{{ item.url | relative_url }}">
        <h2>{{ item.title }}</h2>  <!-- uses the 'title' front matter -->
        <p>{{ item.content | strip_html | truncatewords: 25 | append: "..." }}</p>
      </a>
    {% endfor %}
  </section>
</main>
